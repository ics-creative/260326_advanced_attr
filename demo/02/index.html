<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta content="width=device-width, initial-scale=1" name="viewport" />
  <title>2. HTML属性で入力欄の幅を変えるデモ</title>
  <link href="../base.css" rel="stylesheet" />
  <style>
    .field {
      display: grid;
      gap: 8px;

      label {
        color: #333;
        font-size: 14px;
      }

      input {
        width: calc(attr(size type(<number>), 20) * 1ch + 24px);
        padding: 12px;
        font: inherit;
        font-weight: 700;
        border: 2px solid #cfcfcf;
        border-radius: 10px;
      }
    }
  </style>
</head>

<body>
<div class="wrapper">
  <div class="field">
    <label for="name">名前</label>
    <input id="name" type="text" size="12" value="Hina" />
  </div>

  <div class="field">
    <label for="email">メールアドレス</label>
    <input id="email" type="email" size="24" value="hina@example.com" />
  </div>

  <div class="field">
    <label for="message">お問い合わせ内容</label>
    <input id="message" type="text" size="36" value="attr() のデモを作っています。" />
  </div>
</div>
<script>
</script>
</body>
</html>
