<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta content="width=device-width, initial-scale=1" name="viewport" />
  <title>2. HTML属性でハート評価の見た目を切り替えるデモ</title>
  <link href="../base.css" rel="stylesheet" />
  <style>
    .wrapper {
      width: auto;
      gap: 28px;
      padding: 100px;
    }

    .heart-rating {
      --fill: calc(attr(data-rating type(<number>), 0) * 20%);

      display: flex;
      align-items: center;
      gap: 18px;
      color: #1f2937;
      font-size: 2rem;

      .hearts {
        width: 5em; /* ハート5個分 + すき間ぶんを含めた幅 */
        height: 1em;
        background: linear-gradient(to right, #ff5470 var(--fill), #e5e7eb var(--fill));
        mask-image: url("../images/heart.svg");
        mask-repeat: space;
        mask-size: 1em 1em;
      }

      .score {
        font-size: 1.4rem;
      }
    }
  </style>
</head>

<body>
<div class="wrapper">
  <div class="heart-rating" data-rating="2.5">
    <span class="hearts"></span>
    <span class="score">2.5</span>
  </div>

  <div class="heart-rating" data-rating="3.3">
    <span class="hearts"></span>
    <span class="score">3.3</span>
  </div>

  <div class="heart-rating" data-rating="4.8">
    <span class="hearts"></span>
    <span class="score">4.8</span>
  </div>
</div>
<script>
</script>
</body>
</html>
